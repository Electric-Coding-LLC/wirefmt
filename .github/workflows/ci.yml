name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11
  NODE_VERSION: 24

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Build packaged entrypoints
        run: bun run build

      - name: Check npm package contents
        run: bun run pack:dry-run

      - name: Smoke-test packed install
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .tmp-pack
          tarball="$(
            npm pack --json --pack-destination .tmp-pack --ignore-scripts \
              | node -e 'const fs = require("fs"); const input = fs.readFileSync(0, "utf8"); const match = input.match(/"filename"\s*:\s*"([^"]+\.tgz)"/); if (!match) process.exit(1); console.log(match[1]);'
          )"
          node tools/smoke-packed-install.js ".tmp-pack/$tarball"
