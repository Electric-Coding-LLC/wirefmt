name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Pack release tarball
        run: bun pm pack

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Smoke-test packed install
        shell: bash
        run: |
          set -euo pipefail

          tarball="$(ls ./*.tgz)"
          tmp_dir="$(mktemp -d)"

          pushd "$tmp_dir" >/dev/null
          bun add "$GITHUB_WORKSPACE/$tarball"

          ./node_modules/.bin/wirefmt --version

          actual_output="$(
            printf '+--+\n|x|\n+--+\n' | ./node_modules/.bin/wirefmt format
          )"
          expected_output=$'+---+\n| x |\n+---+'

          if [[ "$actual_output" != "$expected_output" ]]; then
            echo "unexpected wirefmt output"
            echo "expected:"
            printf '%s\n' "$expected_output"
            echo "actual:"
            printf '%s\n' "$actual_output"
            exit 1
          fi

          set +e
          timeout 2s ./node_modules/.bin/wirefmt-mcp
          exit_code=$?
          set -e

          if [[ "$exit_code" != "0" && "$exit_code" != "124" ]]; then
            echo "wirefmt-mcp exited unexpectedly with code $exit_code"
            exit 1
          fi

          popd >/dev/null
