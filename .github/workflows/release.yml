name: Release Package

on:
  push:
    tags:
      - v*

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.11
  NODE_VERSION: 24

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Set up npm
        run: npm install --global npm@11.5.1

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          tag="v$package_version"
          target_sha="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"

          if [[ ! "$package_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json version is not valid semver: $package_version"
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" != "$tag" ]]; then
            echo "tag ${GITHUB_REF_NAME} does not match package.json version tag $tag"
            exit 1
          fi

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Require successful CI for tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          target_sha="${{ steps.release.outputs.target_sha }}"

          ci_conclusion="$(
            gh api -X GET "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
              -f head_sha="$target_sha" \
              -f event="push" \
              -f branch="main" \
              -f status="completed" \
              -f per_page=1 \
              --jq '.workflow_runs[0].conclusion // ""'
          )"

          if [[ "$ci_conclusion" != "success" ]]; then
            echo "Expected successful CI for tagged commit $target_sha on main before release."
            echo "Current CI conclusion: ${ci_conclusion:-<none>}"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Build packaged entrypoints
        run: bun run build

      - name: Check npm package contents
        run: bun run pack:dry-run

      - name: Smoke-test packed install
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .tmp-pack
          tarball="$(
            npm pack --json --pack-destination .tmp-pack --ignore-scripts \
              | node -e 'const fs = require("fs"); const input = fs.readFileSync(0, "utf8"); const match = input.match(/"filename"\s*:\s*"([^"]+\.tgz)"/); if (!match) process.exit(1); console.log(match[1]);'
          )"
          node tools/smoke-packed-install.js ".tmp-pack/$tarball"

      - name: Check registry for existing version
        id: registry
        shell: bash
        run: |
          set -euo pipefail

          if npm view "${{ steps.release.outputs.package_name }}@${{ steps.release.outputs.package_version }}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.release.outputs.package_name }}@${{ steps.release.outputs.package_version }} is already published; skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.registry.outputs.already_published != 'true'
        run: npm publish --access public

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.package_version }}"
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub release $tag already exists"
            exit 1
          fi

          gh release create "$tag" \
            --target "${{ steps.release.outputs.target_sha }}" \
            --title "$tag" \
            --generate-notes
